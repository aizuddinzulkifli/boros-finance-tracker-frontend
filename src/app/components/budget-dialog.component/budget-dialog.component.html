<p>budget-dialog.component works!</p>
<h2 mat-dialog-title>Add / Edit Budget</h2>

<form [formGroup]="form" (ngSubmit)="submit()" class="budget-form">
  <mat-dialog-content>

    <!-- Category -->
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Category</mat-label>
      <input matInput formControlName="categoryId" placeholder="Enter category ID">
    </mat-form-field>

    <!-- Amount -->
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Amount</mat-label>
      <input matInput type="number" formControlName="amount" placeholder="Enter budget amount">
    </mat-form-field>

    <!-- Year -->
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Year</mat-label>
      <input matInput type="number" formControlName="year">
    </mat-form-field>

    <!-- Month -->
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Month</mat-label>
      <input matInput type="number" formControlName="month">
    </mat-form-field>

  </mat-dialog-content>

  <!--<mat-dialog-actions align="end">
    <button mat-button type="button" (click)="dialogRef.close()">Cancel</button>
    <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">Save</button>
  </mat-dialog-actions>-->
</form>
