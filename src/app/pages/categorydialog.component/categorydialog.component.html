<h2>Manage Categories</h2>
<button mat-raised-button color="primary" (click)="addCategory()">Add Category</button>

<table mat-table [dataSource]="categories" class="mat-elevation-z8" style="width:100%; margin-top: 1rem;">
  <ng-container matColumnDef="categoryId">
    <th mat-header-cell *matHeaderCellDef>ID</th>
    <td mat-cell *matCellDef="let cat">{{cat.categoryId}}</td>
  </ng-container>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Name</th>
    <td mat-cell *matCellDef="let cat">{{cat.name}}
      <span *ngIf="isDefaultCategory(cat)"
            style="font-size:12px; color: gray; margin-left: 6px;">
          (Default)
      </span>
    </td>
  </ng-container>

  <ng-container matColumnDef="type">
    <th mat-header-cell *matHeaderCellDef>Type</th>
    <td mat-cell *matCellDef="let cat">{{cat.type}}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let cat">
      <button mat-button color="accent" (click)="editCategory(cat)" [disabled]="isDefaultCategory(cat)">Edit</button>
      <button mat-button color="warn" (click)="deleteCategory(cat)" [disabled]="isDefaultCategory(cat)">Delete</button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
